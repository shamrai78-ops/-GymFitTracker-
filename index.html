<style>

const BodySVG = ({svgStr, getColor}) => {
  const ref = React.useRef(null);
  React.useEffect(() => {
    if (!ref.current) return;
    ref.current.querySelectorAll('.m').forEach(el => {
      const tag = el.getAttribute('data-m');
      const col = getColor(tag);
      if (col) {
        el.setAttribute('fill', col);
        el.style.filter = 'drop-shadow(0 0 3px ' + col + ')';
      } else {
        el.setAttribute('fill', '#1a1a2e');
        el.style.filter = '';
      }
    });
  });
  return <div ref={ref} dangerouslySetInnerHTML={{__html: svgStr}} style={{width:"100%"}}/>;
};

        const sets=log.sets?.[ex.id];

        const valid=Object.values(sets).filter(s=>s.w);
        if(!valid.length) return;
        muscleSets[ex.tag]=(muscleSets[ex.tag]||0)+valid.length;
        muscleVol[ex.tag]=(muscleVol[ex.tag]||0)+valid.reduce((a,s)=>a+parseFloat(s.w||0)*parseFloat(s.r||0),0);
      });
    });
    const maxSets=Math.max(...Object.values(muscleSets),1);
    const totalVol=Object.values(muscleVol).reduce((a,v)=>a+v,0);
    const getColor=tag=>{
      const n=muscleSets[tag]||0;
      if(!n) return null;
      const t=Math.min(n/maxSets,1);
      if(t<0.33) return "rgba(59,130,246,"+(0.5+t*1.5)+")";
      if(t<0.66) return "rgba(34,197,94,"+(0.6+t*0.6)+")";
      return "rgba(34,197,94,0.9)";
    };

      {tag:"Груди",label:"Груди"},{tag:"Спина",label:"Спина"},

              {[{label:"ТРЕНУВАНЬ",val:history.length,c:"#3B82F6"},{label:"ТИЖДЕНЬ",val:weekNum,c:"#F59E0B"},{label:"ДО DELOAD",val:toDeload||6,c:"#EF4444"}].map(x=>(
                <div key={x.label} style={{background:"#0C0C18",border:"1px solid #13131F",borderRadius:10,padding:"12px 8px",textAlign:"center"}}>
                  <div style={{fontSize:".52rem",color:"#333",letterSpacing:".12em",marginBottom:3}}>{x.label}</div>
                  <div style={{fontFamily:"'Bebas Neue'",fontSize:"1.8rem",lineHeight:1,color:x.c}}>{x.val}</div>
                </div>
              ))}
            </div>
            {history.length===0
              ? <div style={{textAlign:"center",color:"#1a1a2a",fontSize:".8rem",marginTop:40}}>Проведи тренування щоб побачити рекорди</div>
              : DAYS.map(day=>{
                  const d=program[day];
                  const exPR=d.exercises.map(ex=>({...ex,pr:getPR(ex.id)})).filter(e=>e.pr);
                  if(!exPR.length) return null;
                  return (
                    <div key={day} style={{marginBottom:18}}>
                      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
                        <div style={{height:1,width:10,background:d.color}}/>
                        <span style={{fontSize:".58rem",color:d.color,letterSpacing:".12em"}}>{day} — {d.label}</span>
                        <div style={{flex:1,height:1,background:"#111120"}}/>
                      </div>
                      {exPR.map(ex=>(
                        <div key={ex.id} style={{background:"#0C0C18",border:"1px solid #13131F",borderRadius:8,padding:"10px 14px",marginBottom:5,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                          <div style={{fontSize:".75rem",color:"#a0a0c0"}}>{ex.name}</div>
                          <div style={{display:"flex",alignItems:"center",gap:5}}>
                            <span style={{fontSize:".55rem",color:"#F59E0B",letterSpacing:".1em"}}>PR</span>
                            <span style={{fontFamily:"'Bebas Neue'",fontSize:"1.1rem",color:d.color}}>{ex.pr} кг</span>
                          </div>
                        </div>
                      ))}
                    </div>
                  );
                })
            }
          </>}

          {/* ── HISTORY TAB ── */}
          {statsTab==="history" && <>
            {history.length===0
              ? <div style={{textAlign:"center",color:"#222",fontSize:".8rem",marginTop:60}}>Поки немає записів</div>
              : history.map((log,i)=>{
                  const d=program[log.day];
                  const exEntries=Object.entries(log.sets||{}).filter(([,s])=>Object.values(s).some(v=>v.w));
                  return (
                    <div key={i} style={{background:"#0C0C18",border:`1px solid ${d.color}18`,borderLeft:`3px solid ${d.color}`,borderRadius:10,padding:"12px 14px",marginBottom:8}}>
                      <div style={{display:"flex",justifyContent:"space-between",marginBottom:7}}>
                        <div>
                          <span style={{fontSize:".56rem",color:d.color,letterSpacing:".12em"}}>{d.label}</span>
                          <div style={{fontFamily:"'Bebas Neue'",fontSize:".95rem",letterSpacing:".05em",marginTop:2}}>{log.day}</div>
                        </div>
                        <div style={{fontSize:".63rem",color:"#333"}}>{fmtDate(log.date)}</div>
                      </div>
                      {exEntries.map(([exId,sets])=>{
                        const ex=d.exercises.find(e=>e.id===exId);
                        if(!ex) return null;
                        const arr=Object.values(sets).filter(s=>s.w);
                        return (
                          <div key={exId} style={{marginBottom:4}}>
                            <div style={{fontSize:".6rem",color:"#353545"}}>{ex.name}</div>
                            <div style={{fontSize:".65rem",color:"#505060"}}>{arr.map(s=>`${s.w}${ex.noWeight?"":"кг"}×${s.r||"—"}`).join(" · ")}</div>
                          </div>
                        );
                      })}
                    </div>
                  );
                })
            }
          </>}

        </div>
      </div>
    );
  }

}


ReactDOM.createRoot(document.getElementById("app")).render(<App/>);
</script>

</body>
</html>
